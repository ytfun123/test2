<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chillcord</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #202225;
            color: #f2f3f5;
            overflow: hidden;
        }
        button, input { font: inherit; }
        button { cursor: pointer; border: 0; }
        .screen { display: none; width: 100%; height: 100%; }
        .screen.active { display: flex; }
        .auth-screen {
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(135deg, #5865f2, #23272a 65%);
        }
        .auth-card {
            width: min(420px, 100%);
            background: #313338;
            border: 1px solid #3f4147;
            border-radius: 8px;
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
            padding: 28px;
        }
        .brand { margin-bottom: 24px; }
        .brand h1 { font-size: 34px; margin-bottom: 8px; }
        .brand p { color: #b5bac1; line-height: 1.4; }
        .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
        .tab {
            padding: 10px;
            border-radius: 5px;
            background: #2b2d31;
            color: #b5bac1;
            font-weight: 700;
        }
        .tab.active { background: #5865f2; color: white; }
        .form { display: none; }
        .form.active { display: block; }
        .field { margin-bottom: 14px; }
        label { display: block; color: #dbdee1; font-size: 13px; font-weight: 700; margin-bottom: 7px; }
        input {
            width: 100%;
            border: 1px solid #1e1f22;
            background: #1e1f22;
            color: #f2f3f5;
            border-radius: 5px;
            padding: 12px;
            outline: none;
        }
        input:focus { border-color: #5865f2; }
        .primary {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            color: white;
            border-radius: 5px;
            font-weight: 800;
        }
        .primary:hover { background: #4752c4; }
        .alert {
            display: none;
            border-radius: 5px;
            padding: 10px 12px;
            margin-bottom: 14px;
            background: #da373c;
            color: white;
            font-size: 14px;
        }
        .alert.active { display: block; }
        .alert.success { background: #248046; }
        .app-screen { background: #313338; }
        .sidebar {
            width: 310px;
            background: #2b2d31;
            border-right: 1px solid #1e1f22;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .profile { padding: 16px; border-bottom: 1px solid #1e1f22; }
        .profile-name { font-weight: 800; margin-bottom: 5px; }
        .profile-id { color: #949ba4; font-size: 12px; word-break: break-all; margin-bottom: 12px; }
        .logout { background: #4e5058; color: white; padding: 8px 10px; border-radius: 4px; width: 100%; }
        .sidebar-content { padding: 14px; overflow: auto; min-height: 0; }
        .section { margin-bottom: 18px; }
        .section-title { color: #949ba4; font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .chat-item {
            display: block;
            width: 100%;
            text-align: left;
            background: transparent;
            color: #dbdee1;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 4px;
            word-break: break-word;
        }
        .chat-item:hover, .chat-item.active { background: #404249; color: white; }
        .friend-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: 8px; }
        .friend-row input { padding: 10px; }
        .friend-row button { background: #248046; color: white; border-radius: 5px; padding: 0 12px; font-weight: 800; }
        .small-note { color: #949ba4; font-size: 12px; margin-top: 8px; line-height: 1.4; }
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .header { padding: 18px 20px; border-bottom: 1px solid #1e1f22; background: #313338; }
        .header h2 { font-size: 20px; margin-bottom: 4px; }
        .header p { color: #949ba4; font-size: 13px; }
        .messages { flex: 1; overflow: auto; padding: 20px; background: #313338; }
        .empty { color: #949ba4; text-align: center; margin-top: 12vh; }
        .message { display: grid; grid-template-columns: 40px 1fr; gap: 12px; margin-bottom: 16px; }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #5865f2;
            color: white;
            display: grid;
            place-items: center;
            font-weight: 900;
        }
        .message-meta { display: flex; gap: 8px; align-items: baseline; margin-bottom: 3px; }
        .message-author { font-weight: 800; }
        .message-time { color: #949ba4; font-size: 12px; }
        .message-text { color: #dbdee1; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
        .composer { display: flex; gap: 10px; padding: 16px 20px; background: #313338; }
        .composer input { background: #383a40; border-color: #383a40; }
        .composer button { background: #5865f2; color: white; border-radius: 5px; padding: 0 18px; font-weight: 800; }
        .status { color: #949ba4; font-size: 12px; margin-top: 8px; }
        @media (max-width: 760px) {
            .app-screen { flex-direction: column; }
            .sidebar { width: 100%; max-height: 42vh; }
            .main { min-height: 58vh; }
        }
    </style>
</head>
<body>
    <section class="screen auth-screen active" id="authScreen">
        <div class="auth-card">
            <div class="brand">
                <h1>Chillcord</h1>
                <p>Realtime chat with global messages and direct messages.</p>
                <div class="status" id="backendStatus">Checking server...</div>
            </div>
            <div class="tabs">
                <button class="tab active" id="signinTab" type="button">Sign In</button>
                <button class="tab" id="signupTab" type="button">Create Account</button>
            </div>
            <div class="alert" id="authAlert"></div>
            <form class="form active" id="signinForm">
                <div class="field">
                    <label for="signinUsername">Username</label>
                    <input id="signinUsername" type="text" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="signinPassword">Password</label>
                    <input id="signinPassword" type="password" autocomplete="current-password" required>
                </div>
                <button class="primary" type="submit">Sign In</button>
            </form>
            <form class="form" id="signupForm">
                <div class="field">
                    <label for="signupUsername">Username</label>
                    <input id="signupUsername" type="text" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="signupPassword">Password</label>
                    <input id="signupPassword" type="password" autocomplete="new-password" required>
                </div>
                <button class="primary" type="submit">Create Account</button>
            </form>
        </div>
    </section>

    <section class="screen app-screen" id="appScreen">
        <aside class="sidebar">
            <div class="profile">
                <div class="profile-name" id="currentUsername"></div>
                <div class="profile-id" id="currentUserId"></div>
                <button class="logout" id="logoutButton" type="button">Logout</button>
            </div>
            <div class="sidebar-content">
                <div class="section">
                    <div class="section-title">Channels</div>
                    <button class="chat-item active" type="button" data-chat-id="global" id="globalChatButton"># global</button>
                </div>
                <div class="section">
                    <div class="section-title">Add Friend</div>
                    <div class="friend-row">
                        <input id="friendInput" type="text" placeholder="Username">
                        <button id="addFriendButton" type="button">Add</button>
                    </div>
                    <div class="small-note" id="friendNote">Add friends by username.</div>
                </div>
                <div class="section">
                    <div class="section-title">Direct Messages</div>
                    <div id="friendsList"><div class="small-note">No friends yet.</div></div>
                </div>
            </div>
        </aside>
        <main class="main">
            <header class="header">
                <h2 id="chatTitle"># global</h2>
                <p id="chatDescription">Everyone connected to this Chillcord server.</p>
            </header>
            <div class="messages" id="messagesArea"></div>
            <form class="composer" id="messageForm">
                <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </main>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const fallbackStore = {
            users: [],
            friends: {},
            messages: { global: [] }
        };

        let state = loadLocalState();
        let currentUser = loadCurrentUser();
        let currentChat = "global";
        let socket = null;
        let backendOnline = false;

        const els = {
            authScreen: document.getElementById("authScreen"),
            appScreen: document.getElementById("appScreen"),
            authAlert: document.getElementById("authAlert"),
            backendStatus: document.getElementById("backendStatus"),
            signinTab: document.getElementById("signinTab"),
            signupTab: document.getElementById("signupTab"),
            signinForm: document.getElementById("signinForm"),
            signupForm: document.getElementById("signupForm"),
            currentUsername: document.getElementById("currentUsername"),
            currentUserId: document.getElementById("currentUserId"),
            friendsList: document.getElementById("friendsList"),
            friendInput: document.getElementById("friendInput"),
            friendNote: document.getElementById("friendNote"),
            messagesArea: document.getElementById("messagesArea"),
            messageInput: document.getElementById("messageInput"),
            chatTitle: document.getElementById("chatTitle"),
            chatDescription: document.getElementById("chatDescription")
        };

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#039;"
            }[char]));
        }

        function loadLocalState() {
            try {
                return { ...fallbackStore, ...JSON.parse(localStorage.getItem("chillcordState") || "{}") };
            } catch {
                return structuredClone(fallbackStore);
            }
        }

        function saveLocalState() {
            localStorage.setItem("chillcordState", JSON.stringify(state));
        }

        function loadCurrentUser() {
            try {
                return JSON.parse(localStorage.getItem("chillcordCurrentUser") || "null");
            } catch {
                return null;
            }
        }

        function saveCurrentUser(user) {
            currentUser = user;
            if (user) {
                localStorage.setItem("chillcordCurrentUser", JSON.stringify(user));
            } else {
                localStorage.removeItem("chillcordCurrentUser");
            }
        }

        async function api(path, options = {}) {
            const response = await fetch(path, {
                headers: { "Content-Type": "application/json" },
                ...options,
                body: options.body ? JSON.stringify(options.body) : undefined
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "Request failed");
            return data;
        }

        async function initBackend() {
            if (!window.io) {
                setBackendStatus(false);
                return;
            }
            try {
                const data = await api("/api/state");
                backendOnline = true;
                state = data;
                saveLocalState();
                socket = io();
                socket.on("state", nextState => {
                    state = nextState;
                    saveLocalState();
                    renderApp();
                });
                setBackendStatus(true);
                if (currentUser && !state.users.some(user => user.id === currentUser.id)) {
                    saveCurrentUser(null);
                }
            } catch (error) {
                setBackendStatus(false);
            }
        }

        function setBackendStatus(isOnline) {
            backendOnline = isOnline;
            els.backendStatus.textContent = isOnline
                ? "Connected to realtime server."
                : "Server not running. Using local demo storage.";
        }

        function showAlert(message, success = false) {
            els.authAlert.textContent = message;
            els.authAlert.className = `alert active ${success ? "success" : ""}`;
            window.setTimeout(() => els.authAlert.classList.remove("active"), 3500);
        }

        function showFriendNote(message, success = false) {
            els.friendNote.textContent = message;
            els.friendNote.style.color = success ? "#3ba55d" : "#f23f42";
            window.setTimeout(() => {
                els.friendNote.textContent = "Add friends by username.";
                els.friendNote.style.color = "#949ba4";
            }, 3500);
        }

        function switchAuth(mode) {
            const isSignin = mode === "signin";
            els.signinTab.classList.toggle("active", isSignin);
            els.signupTab.classList.toggle("active", !isSignin);
            els.signinForm.classList.toggle("active", isSignin);
            els.signupForm.classList.toggle("active", !isSignin);
        }

        function openApp() {
            els.authScreen.classList.remove("active");
            els.appScreen.classList.add("active");
            renderApp();
        }

        function openAuth() {
            els.appScreen.classList.remove("active");
            els.authScreen.classList.add("active");
        }

        function makeId(prefix) {
            return `${prefix}_${Math.random().toString(36).slice(2, 10).toUpperCase()}`;
        }

        async function signUp(username, password) {
            if (backendOnline) {
                return api("/api/signup", { method: "POST", body: { username, password } });
            }
            if (state.users.some(user => user.username.toLowerCase() === username.toLowerCase())) {
                throw new Error("Username already exists");
            }
            const user = { id: makeId("USER"), username, password, createdAt: new Date().toISOString() };
            state.users.push(user);
            state.friends[user.id] = [];
            saveLocalState();
            return { id: user.id, username: user.username };
        }

        async function signIn(username, password) {
            if (backendOnline) {
                return api("/api/signin", { method: "POST", body: { username, password } });
            }
            const user = state.users.find(item => item.username.toLowerCase() === username.toLowerCase() && item.password === password);
            if (!user) throw new Error("Invalid username or password");
            return { id: user.id, username: user.username };
        }

        async function addFriend() {
            const username = els.friendInput.value.trim();
            if (!username) return showFriendNote("Enter a username first.");
            try {
                if (backendOnline) {
                    state = await api("/api/friends", { method: "POST", body: { userId: currentUser.id, username } });
                } else {
                    const friend = state.users.find(user => user.username.toLowerCase() === username.toLowerCase() && user.id !== currentUser.id);
                    if (!friend) throw new Error("User not found");
                    state.friends[currentUser.id] ||= [];
                    state.friends[friend.id] ||= [];
                    if (state.friends[currentUser.id].includes(friend.id)) throw new Error("Already friends");
                    state.friends[currentUser.id].push(friend.id);
                    state.friends[friend.id].push(currentUser.id);
                    saveLocalState();
                }
                els.friendInput.value = "";
                showFriendNote("Friend added.", true);
                renderApp();
            } catch (error) {
                showFriendNote(error.message);
            }
        }

        function getConversationKey() {
            if (currentChat === "global") return "global";
            const friendId = currentChat.replace("friend_", "");
            return [currentUser.id, friendId].sort().join(":");
        }

        async function sendMessage(text) {
            const conversationId = getConversationKey();
            if (backendOnline) {
                state = await api("/api/messages", {
                    method: "POST",
                    body: { userId: currentUser.id, conversationId, text }
                });
                return;
            }
            state.messages[conversationId] ||= [];
            state.messages[conversationId].push({
                id: makeId("MSG"),
                userId: currentUser.id,
                conversationId,
                text,
                timestamp: new Date().toISOString()
            });
            saveLocalState();
        }

        function renderApp() {
            if (!currentUser) return openAuth();
            els.currentUsername.textContent = currentUser.username;
            els.currentUserId.textContent = currentUser.id;
            renderFriends();
            renderMessages();
            updateHeader();
        }

        function renderFriends() {
            const ids = state.friends[currentUser.id] || [];
            const friends = ids.map(id => state.users.find(user => user.id === id)).filter(Boolean);
            if (!friends.length) {
                els.friendsList.innerHTML = '<div class="small-note">No friends yet.</div>';
                return;
            }
            els.friendsList.innerHTML = friends.map(friend => `
                <button class="chat-item ${currentChat === `friend_${friend.id}` ? "active" : ""}" type="button" data-friend-id="${friend.id}">
                    @${escapeHtml(friend.username)}
                </button>
            `).join("");
            els.friendsList.querySelectorAll("button").forEach(button => {
                button.addEventListener("click", () => {
                    currentChat = `friend_${button.dataset.friendId}`;
                    renderApp();
                });
            });
        }

        function updateHeader() {
            document.querySelectorAll(".chat-item").forEach(item => item.classList.remove("active"));
            if (currentChat === "global") {
                document.getElementById("globalChatButton").classList.add("active");
                els.chatTitle.textContent = "# global";
                els.chatDescription.textContent = backendOnline ? "Everyone connected to this server." : "Local demo chat on this browser.";
                return;
            }
            const friendId = currentChat.replace("friend_", "");
            const friend = state.users.find(user => user.id === friendId);
            els.chatTitle.textContent = friend ? `@${friend.username}` : "Direct message";
            els.chatDescription.textContent = "Private conversation between friends.";
        }

        function renderMessages() {
            const conversationId = getConversationKey();
            const messages = state.messages[conversationId] || [];
            if (!messages.length) {
                els.messagesArea.innerHTML = '<div class="empty">No messages yet. Start the conversation.</div>';
                return;
            }
            els.messagesArea.innerHTML = messages.map(message => {
                const author = state.users.find(user => user.id === message.userId) || { username: "Unknown" };
                const initial = author.username.slice(0, 1).toUpperCase();
                const time = new Date(message.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
                return `
                    <div class="message">
                        <div class="avatar">${escapeHtml(initial)}</div>
                        <div>
                            <div class="message-meta">
                                <span class="message-author">${escapeHtml(author.username)}</span>
                                <span class="message-time">${time}</span>
                            </div>
                            <div class="message-text">${escapeHtml(message.text)}</div>
                        </div>
                    </div>
                `;
            }).join("");
            els.messagesArea.scrollTop = els.messagesArea.scrollHeight;
        }

        els.signinTab.addEventListener("click", () => switchAuth("signin"));
        els.signupTab.addEventListener("click", () => switchAuth("signup"));
        document.getElementById("globalChatButton").addEventListener("click", () => {
            currentChat = "global";
            renderApp();
        });
        document.getElementById("addFriendButton").addEventListener("click", addFriend);
        document.getElementById("logoutButton").addEventListener("click", () => {
            saveCurrentUser(null);
            currentChat = "global";
            openAuth();
        });
        els.signinForm.addEventListener("submit", async event => {
            event.preventDefault();
            try {
                const user = await signIn(document.getElementById("signinUsername").value.trim(), document.getElementById("signinPassword").value);
                saveCurrentUser(user);
                openApp();
            } catch (error) {
                showAlert(error.message);
            }
        });
        els.signupForm.addEventListener("submit", async event => {
            event.preventDefault();
            const username = document.getElementById("signupUsername").value.trim();
            const password = document.getElementById("signupPassword").value;
            if (username.length < 3) return showAlert("Username must be at least 3 characters");
            if (password.length < 6) return showAlert("Password must be at least 6 characters");
            try {
                const user = await signUp(username, password);
                saveCurrentUser(user);
                openApp();
            } catch (error) {
                showAlert(error.message);
            }
        });
        document.getElementById("messageForm").addEventListener("submit", async event => {
            event.preventDefault();
            const text = els.messageInput.value.trim();
            if (!text) return;
            els.messageInput.value = "";
            try {
                await sendMessage(text);
                renderApp();
            } catch (error) {
                els.messageInput.value = text;
                showFriendNote(error.message);
            }
        });

        initBackend().then(() => {
            if (currentUser) openApp();
        });
    </script>
</body>
</html>
